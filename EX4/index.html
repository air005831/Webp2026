<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>聖誕樹 Console Demo</title>
    <style>
        /* 將 SCSS 變數轉換為純 CSS */
        body {
            font-family: system-ui, sans-serif;
            /* 模擬原圖的漸層背景 */
            background: linear-gradient(to bottom, darkorchid, #7a26ad);
            color: white;
            height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
        }
    </style>
</head>
<body>

    <h1>👋 Hello World!</h1>

    <script>
        function tree(n) {
            printTreeTop(n);
            printTreeBottom(n);
        }

        function printTreeTop(n) {
            for (let i = 0; i < n; i++) {
                console.log(' '.repeat(n - i - 1) + '*'.repeat(2 * i + 1));
            }
        }

        function printTreeBottom(n) {
            for (let i = 0; i < 3; i++) {
                console.log(' '.repeat(n - 1) + '*');
            }
        }

        // 執行並查看開發者工具 (F12) 的 Console
        tree(4);
    </script>
</body>
</html>
