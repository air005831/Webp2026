<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>極簡課程列表</title>
<style>
  /* 表格基本樣式 */
  table { width: 100%; border-collapse: collapse; font-family: sans-serif; }
  th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
  thead { background-color: #00b072; color: white; }

  .course-btn {
    background: none; border: none; color: #0056b3; 
    cursor: pointer; text-decoration: underline; padding: 0;
  }

  /* 極簡彈窗樣式 */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0;
    width: 100%; height: 100%; background: rgba(0,0,0,0.6);
    z-index: 1000; justify-content: center; align-items: center;
    backdrop-filter: blur(3px); /* 背景輕微模糊，增加質感 */
  }

  .modal-content {
    background: white; 
    width: 90vw; height: 85vh; /* 佔據大部分螢幕 */
    position: relative; 
    border-radius: 12px;
    overflow: hidden; /* 確保 iframe 圓角不被切掉 */
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  /* 懸浮關閉按鈕：直接浮在網頁右上角 */
  .modal-close {
    position: absolute; top: 15px; right: 15px;
    width: 35px; height: 35px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid #ddd; font-size: 20px;
    cursor: pointer; z-index: 1001;
    display: flex; align-items: center; justify-content: center;
    transition: 0.2s;
  }
  .modal-close:hover { background: #eee; transform: scale(1.1); }

  /* 移除 iframe 邊框並填滿 */
  iframe { width: 100%; height: 100%; border: none; display: block; }

  .modal-overlay.show { display: flex; }
</style>
</head>
<body>

  <table>
    <thead>
      <tr>
        <th>開課序號</th>
        <th>課程名稱</th>
        <th>授課教師</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>A2346</td><td><button class="course-btn" data-id="A2346">資料結構與演算法(2)</button></td><td>趙一平</td></tr>
      <tr><td>A2347</td><td><button class="course-btn" data-id="A2347">系統程式</button></td><td>黃崇源</td></tr>
      <tr><td>A2348</td><td><button class="course-btn" data-id="A2348">網頁程式設計</button></td><td>吳齊人</td></tr>
      <tr><td>A2350</td><td><button class="course-btn" data-id="A2350">機率與統計</button></td><td>呂仁園</td></tr>
      <tr><td>A2351</td><td><button class="course-btn" data-id="A2351">體育大二(2)</button></td><td>鄭景文</td></tr>
      <tr><td>A2774</td><td><button class="course-btn" data-id="A2774">交響樂的世界</button></td><td>洪于淳</td></tr>
    </tbody>
  </table>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">&times;</button>
      <iframe id="courseIframe" src=""></iframe>
    </div>
  </div>

  <script>
    const btns = document.querySelectorAll('.course-btn');
    const overlay = document.getElementById('modalOverlay');
    const iframe = document.getElementById('courseIframe');

    btns.forEach(btn => {
      btn.addEventListener('click', function() {
        const id = this.getAttribute('data-id');
        iframe.src = `https://catalog.cgu.edu.tw/coursedata?sectionid=${id}`;
        overlay.classList.add('show');
      });
    });

    const closeBox = () => { overlay.classList.remove('show'); iframe.src = ""; };
    document.getElementById('modalClose').onclick = closeBox;
    window.onclick = (e) => { if(e.target == overlay) closeBox(); }
  </script>

</body>
</html>
